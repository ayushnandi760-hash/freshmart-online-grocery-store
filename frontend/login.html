<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FreshMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🥬</div>
        <h1>Welcome Back</h1>
        <p>Log in to access your account and orders</p>
      </div>

      <form id="login-form">
        <div class="form-group" id="group-email">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          <div class="form-error" id="error-email">Please enter a valid email</div>
        </div>

        <div class="form-group" id="group-password">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
          <div class="form-error" id="error-password">Password is required</div>
        </div>

        <div class="form-error" id="form-general-error" style="text-align: center; margin-bottom: 16px;"></div>

        <button type="submit" class="btn-submit" id="submit-btn">
          Log In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
