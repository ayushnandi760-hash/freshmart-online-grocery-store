<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — FreshMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  
  <main class="container checkout-page">
    <h1>Checkout</h1>

    <div id="checkout-loader" class="loader">
      <div class="spinner"></div>
    </div>

    <div id="checkout-content" style="display: none;">
      <div class="checkout-grid">
        
        <!-- Left Column: Forms -->
        <div>
          <!-- Payment Method -->
          <div class="payment-badge">
            <div class="pay-icon">💵</div>
            <div>
              <div class="pay-text">Cash on Delivery (COD)</div>
              <div class="pay-sub">Pay when your order arrives</div>
            </div>
          </div>

          <!-- Delivery Details Form -->
          <div class="checkout-form-card">
            <h2>Delivery Details</h2>
            
            <form id="checkout-form">
              <div class="form-group" id="group-name">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
                <div class="form-error" id="error-name">Name is required</div>
              </div>

              <div class="form-group" id="group-phone">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="9876543210" required autocomplete="tel">
                <div class="form-error" id="error-phone">Please enter a valid 10-digit mobile number</div>
              </div>

              <div class="form-group" id="group-address">
                <label for="address">Complete Delivery Address</label>
                <textarea id="address" placeholder="House/Flat No., Building Name, Street, Area, Landmark..." required autocomplete="street-address"></textarea>
                <div class="form-error" id="error-address">Address is too short. Please provide details.</div>
              </div>

              <div class="form-error" id="form-general-error" style="text-align: center; margin-bottom: 16px;"></div>

              <button type="submit" class="btn-submit" id="submit-btn" style="height: 52px; font-size: 16px; margin-top: 10px;">
                Place Order (COD)
              </button>
            </form>
          </div>
        </div>

        <!-- Right Column: Order Summary -->
        <div class="order-summary-card">
          <h2>Order Summary</h2>
          
          <div class="summary-items" id="summary-items-list">
            <!-- Injected via JS -->
          </div>
          
          <div style="border-top: 1px solid var(--gray-200); margin: 16px 0;"></div>

          <div class="cart-summary-row">
            <span>Item Total</span>
            <span>₹<span id="summary-subtotal">0.00</span></span>
          </div>
          <div class="cart-summary-row">
            <span>Delivery Fee</span>
            <span style="color: var(--green-600);">FREE</span>
          </div>
          
          <div class="cart-summary-row total">
            <span>To Pay</span>
            <span>₹<span id="summary-total">0.00</span></span>
          </div>
        </div>
        
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
