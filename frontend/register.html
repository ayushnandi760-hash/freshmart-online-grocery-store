<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FreshMart</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">✨</div>
        <h1>Create Account</h1>
        <p>Join FreshMart for fresh groceries in minutes</p>
      </div>

      <form id="register-form">
        <div class="form-group" id="group-name">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
          <div class="form-error" id="error-name">Name must be at least 2 characters</div>
        </div>

        <div class="form-group" id="group-email">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          <div class="form-error" id="error-email">Please enter a valid email</div>
        </div>

        <div class="form-group" id="group-password">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required>
          <div class="form-error" id="error-password">Password must be at least 6 characters</div>
        </div>

        <div class="form-error" id="form-general-error" style="text-align: center; margin-bottom: 16px;"></div>

        <button type="submit" class="btn-submit" id="submit-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Log In</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
